# Configuration Nginx pour le serveur Capteur
# Placez ce fichier dans /etc/nginx/sites-available/ et créez un lien symbolique dans sites-enabled/

upstream capteur_app {
    # Plusieurs workers pour load balancing
    # Ajustez selon vos besoins
    server 127.0.0.1:5002;
    server 127.0.0.1:5003;
    server 127.0.0.1:5004;
    
    # Ou si vous utilisez un socket Unix
    # server unix:/tmp/capteur.sock;
    
    # Configuration pour la persistance de session (optionnel si Redis est utilisé)
    # ip_hash;
}

server {
    listen 80;
    server_name votre-domaine.com;  # Changez ceci
    
    # Taille maximale des uploads (important pour les images haute résolution)
    # Augmentez cette valeur si vous avez des captures d'écran très grandes
    client_max_body_size 100M;
    
    # Logs
    access_log /var/log/nginx/capteur_access.log;
    error_log /var/log/nginx/capteur_error.log;
    
    # Route de l'application sur /capture
    # Le / à la fin de location et proxy_pass est IMPORTANT
    # Il fait que Nginx enlève /capture avant de passer à Flask
    location /capture/ {
        proxy_pass http://capteur_app/;
        
        # En-têtes pour le proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /capture;
        
        # Timeouts pour les uploads longs
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
    
    # Servir les fichiers statiques directement (optionnel, pour performance)
    location /capture/static/ {
        alias /chemin/vers/capteur/server/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Servir les thumbnails directement (optionnel, pour performance)
    # Note: Désactiver la mise en cache pour voir les mises à jour en temps réel
    location /capture/thumbnail/ {
        alias /chemin/vers/capteur/server/thumbnails/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # Redirections pour URLs sans trailing slash
    location = /capture {
        return 301 /capture/;
    }
    
    location /capture/health {
        proxy_pass http://capteur_app/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /capture;
        access_log off;
    }
}

